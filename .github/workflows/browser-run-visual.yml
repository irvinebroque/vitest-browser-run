name: Browser Run Visual Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual:
    name: Vitest visual suite on Browser Run
    runs-on: ubuntu-24.04
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_BROWSER_RUN_CONCURRENCY: '4'
      CF_BROWSER_RUN_LAUNCH_DELAY_MS: '1100'
      CF_BROWSER_RUN_LOG_SESSIONS: 'true'
      CF_BROWSER_RUN_RECORDING: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Confirm hosted browser path
        run: |
          if [ -z "$CF_ACCOUNT_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            printf '%s\n' 'Missing CF_ACCOUNT_ID or CF_API_TOKEN secrets for Browser Run.'
            exit 1
          fi
          printf '%s\n' 'Using Cloudflare Browser Run; this workflow intentionally does not install Playwright browsers.'

      - name: Vitest visual regression on Browser Run
        run: pnpm test:browser-run:visual

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-browser-run-visual-artifacts
          if-no-files-found: ignore
          path: |
            test/browser/**/__screenshots__/**
            .vitest-attachments/**
