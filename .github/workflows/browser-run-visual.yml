name: Browser Run Example Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-run:
    name: Massive parallelism example on Browser Run
    runs-on: ubuntu-24.04
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_BROWSER_RUN_CONCURRENCY: '8'
      CLOUDFLARE_BROWSER_RUN_RECORDING: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Confirm hosted browser path
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            printf '%s\n' 'Missing CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN secrets for Browser Run.'
            exit 1
          fi
          printf '%s\n' 'Using Cloudflare Browser Run; this workflow intentionally does not install Playwright browsers.'
          printf '%s\n' 'The example runs 8 Vitest browser workers against one shared hosted Chromium session.'

      - name: Vitest parallelism example on Browser Run
        run: pnpm test:browser-run

      - name: Upload browser test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-browser-run-example-artifacts
          if-no-files-found: ignore
          path: |
            examples/parallelism/test/browser/**/__screenshots__/**
            examples/parallelism/.vitest-attachments/**
            .vitest-attachments/**
